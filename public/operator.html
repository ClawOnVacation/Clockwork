<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clockwork — Operator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #000; color: #fff; font-family: 'Neue Haas Grotesk Display Pro', 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; gap: 0; }

    .container { display: flex; flex-direction: column; align-items: center; gap: 64px; }

    .timer { display: flex; align-items: baseline; font-size: clamp(72px, 14vw, 160px); font-weight: 500; letter-spacing: -0.02em; line-height: 1; user-select: none; }
    .timer-unit { min-width: 2ch; text-align: center; }
    .timer-dot { opacity: 0.35; padding: 0 0.04em; font-size: 0.7em; align-self: center; }

    .controls-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .controls { display: flex; gap: 16px; }

    .btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: #fff; font-family: inherit; font-size: 13px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; padding: 12px 32px; cursor: pointer; border-radius: 2px; transition: background 0.15s, border-color 0.15s; }
    .btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.5); }
    .btn.active { border-color: #fff; background: rgba(255,255,255,0.1); }
    .btn:disabled { opacity: 0.25; cursor: default; background: none; }

    #sub-display { font-size: 11px; letter-spacing: 0.14em; color: rgba(255,255,255,0.25); }

    .status { width: 6px; height: 6px; border-radius: 50%; background: #333; transition: background 0.3s; }
    .status.running { background: #fff; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .role-tag { position: fixed; top: 20px; right: 24px; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.2); }
    .viewer-link { position: fixed; bottom: 24px; font-size: 11px; letter-spacing: 0.1em; color: rgba(255,255,255,0.2); text-decoration: none; }
    .viewer-link:hover { color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div class="role-tag">Operator</div>

  <div class="container">
    <div class="timer">
      <span class="timer-unit" id="days">00</span>
      <span class="timer-dot">.</span>
      <span class="timer-unit" id="hours">00</span>
      <span class="timer-dot">.</span>
      <span class="timer-unit" id="minutes">00</span>
    </div>

    <div class="controls-wrap">
      <div class="controls">
        <button class="btn" id="btn-start">Start</button>
        <button class="btn" id="btn-pause">Pause</button>
        <button class="btn" id="btn-reset">Reset</button>
      </div>
      <span id="sub-display">00s &nbsp; 000ms</span>
    </div>

    <div class="status" id="status"></div>
  </div>

  <a class="viewer-link" href="/viewer" target="_blank">Open viewer &rarr;</a>

  <script>
    const daysEl   = document.getElementById('days');
    const hoursEl  = document.getElementById('hours');
    const minsEl   = document.getElementById('minutes');
    const subEl    = document.getElementById('sub-display');
    const statusEl = document.getElementById('status');
    const btnStart = document.getElementById('btn-start');
    const btnPause = document.getElementById('btn-pause');
    const btnReset = document.getElementById('btn-reset');

    // Local mirror of server state
    let state     = 'stopped';
    let startTime = null;
    let pausedMs  = 0;
    let clockDiff = 0; // server-client clock offset
    let raf       = null;

    function pad(n) { return String(Math.min(n, 99)).padStart(2, '0'); }

    function render(ms) {
      ms = Math.max(0, ms);
      const totalSec = Math.floor(ms / 1000);
      const totalMin = Math.floor(totalSec / 60);
      const totalHrs = Math.floor(totalMin / 60);
      daysEl.textContent  = pad(Math.floor(totalHrs / 24));
      hoursEl.textContent = pad(totalHrs % 24);
      minsEl.textContent  = pad(totalMin % 60);
      subEl.textContent   = String(totalSec % 60).padStart(2,'0') + 's   ' + String(ms % 1000).padStart(3,'0') + 'ms';
    }

    function elapsed() {
      if (state === 'running')  return (Date.now() + clockDiff) - startTime;
      if (state === 'paused')   return pausedMs;
      return 0;
    }

    function tick() {
      render(elapsed());
      if (state === 'running') raf = requestAnimationFrame(tick);
    }

    function applySync(msg) {
      clockDiff = msg.serverNow - Date.now();
      state     = msg.state;
      startTime = msg.startTime;
      pausedMs  = msg.pausedMs;
      cancelAnimationFrame(raf);

      btnStart.classList.toggle('active', state === 'running');
      btnPause.classList.toggle('active', state === 'paused');
      statusEl.classList.toggle('running', state === 'running');
      btnStart.disabled = state === 'running';
      btnPause.disabled = state === 'stopped';

      render(elapsed());
      if (state === 'running') tick();
    }

    // WebSocket
    const ws = new WebSocket(`ws://${location.host}`);
    ws.onmessage = (e) => { const msg = JSON.parse(e.data); if (msg.type === 'sync') applySync(msg); };
    ws.onclose   = () => { setTimeout(() => location.reload(), 2000); };

    function send(type) { if (ws.readyState === 1) ws.send(JSON.stringify({ type })); }

    btnStart.addEventListener('click', () => send('start'));
    btnPause.addEventListener('click', () => send('pause'));
    btnReset.addEventListener('click', () => send('reset'));

    render(0);
  </script>
</body>
</html>
